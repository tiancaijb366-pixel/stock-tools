<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>行业板块涨跌榜 — A股板块实时资金流向 | Stock Tools</title>
  <meta name="description" content="A股行业板块涨跌榜，实时查看各板块涨跌幅与主力资金流向。数据来源东方财富。">
  <meta name="keywords" content="行业板块,板块涨跌,主力资金,资金流向,A股板块,板块行情">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config={darkMode:'class',theme:{extend:{}}}</script>
  <style>body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Noto Sans SC',sans-serif}.bar{transition:width 1s ease}</style>
</head>
<body class="bg-gray-950 text-gray-200 min-h-screen">
  <header class="border-b border-gray-800 py-6">
    <div class="max-w-4xl mx-auto px-4">
      <h1 class="text-2xl font-bold text-white">📊 行业板块涨跌榜</h1>
      <p class="text-gray-400 text-sm mt-1">数据来源：东方财富 · 自动每 60 秒刷新 · 按涨跌幅排序</p>
    </div>
  </header>

  <main class="max-w-4xl mx-auto px-4 py-6">
    <!-- Loading -->
    <div id="loading" class="flex items-center justify-center py-20">
      <svg class="animate-spin h-6 w-6 text-gray-400" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" fill="none"/><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/></svg>
      <span class="text-sm text-gray-400 ml-3">加载中…</span>
    </div>

    <!-- Stats -->
    <div id="stats" class="text-xs text-gray-500 mb-3 hidden"></div>

    <!-- Table -->
    <div id="tableWrap" class="hidden overflow-x-auto rounded-xl border border-gray-800 bg-gray-900">
      <table class="w-full text-sm">
        <thead>
          <tr class="bg-gray-800 text-gray-400 text-xs uppercase tracking-wide">
            <th class="text-left px-4 py-3 font-medium">#</th>
            <th class="text-left px-4 py-3 font-medium">板块名称</th>
            <th class="text-right px-4 py-3 font-medium">涨跌幅</th>
            <th class="text-left px-4 py-3 font-medium">走势</th>
            <th class="text-right px-4 py-3 font-medium">主力资金 (亿)</th>
          </tr>
        </thead>
        <tbody id="tbody" class="divide-y divide-gray-800"></tbody>
      </table>
    </div>
    <div id="error" class="hidden text-red-400 text-sm text-center py-10"></div>

    <!-- Description -->
    <div class="mt-8 text-xs text-gray-500 space-y-1">
      <p>📌 主力资金 = 超大单 + 大单净流入。正值表示主力买入，负值表示主力卖出。</p>
      <p>📌 数据延时约 1-3 秒，仅供参考，不构成投资建议。</p>
    </div>

    <!-- Other tools -->
    <div class="mt-8 pt-6 border-t border-gray-800 text-center text-sm text-gray-500 space-y-2">
      <p>
        <a href="market.html" class="text-blue-400 hover:text-blue-300">📈 A股实时行情速查</a>
        <span class="mx-2">·</span>
        <a href="fx.html" class="text-blue-400 hover:text-blue-300">💱 汇率 &amp; 加密货币行情</a>
        <span class="mx-2">·</span>
        <a href="bond.html" class="text-blue-400 hover:text-blue-300">🔗 可转债计算器</a>
        <span class="mx-2">·</span>
        <a href="index.html" class="text-blue-400 hover:text-blue-300">🏠 首页</a>
      </p>
    </div>
  </main>

  <footer class="border-t border-gray-800 py-8 text-center text-sm text-gray-500">
    <p class="mb-2">打赏: <code class="text-gray-400 select-all">0x0D42B32D6E21F496082104BFC8d7213081474577</code> (ETH / USDT ERC-20)</p>
    <p>
      <a href="https://prompt-pack-one.vercel.app" class="inline-flex items-center gap-1 text-gray-600 hover:text-gray-300 transition">
        <span>🦄</span> Pony Promo — 独立开发者的 30s 竖屏宣传视频，$19
      </a>
    </p>
  </footer>

  <script>
  (async function() {
    const tbody = document.getElementById('tbody');
    const loading = document.getElementById('loading');
    const tableWrap = document.getElementById('tableWrap');
    const errorEl = document.getElementById('error');
    const stats = document.getElementById('stats');

    async function fetchSectors() {
      const URL = 'https://push2.eastmoney.com/api/qt/clist/get?cb=jq&pn=1&pz=56&po=1&np=1&fields=f12,f14,f2,f3,f4,f104,f105&fs=m:90+t:2';
      const res = await fetch(URL);
      const text = await res.text();
      const json = JSON.parse(text.slice(text.indexOf('(')+1, -1));
      return json.data.diff || [];
    }

    function renderBar(pct, maxPct) {
      const p = Math.abs(pct);
      const w = maxPct > 0 ? Math.max(4, (p / maxPct) * 100) : 0;
      const isUp = pct >= 0;
      return `<div class="w-full bg-gray-800 rounded-full h-3 overflow-hidden">
        <div class="bar h-full rounded-full ${isUp ? 'bg-red-500' : 'bg-green-500'}" style="width:${Math.min(w,100)}%"></div>
      </div>`;
    }

    async function load() {
      try {
        const sectors = await fetchSectors();
        if (!sectors.length) throw new Error('暂无数据');

        const maxPct = Math.max(...sectors.map(s => Math.abs(parseFloat(s.f3) || 0)), 1);

        loading.classList.add('hidden');
        tableWrap.classList.remove('hidden');
        errorEl.classList.add('hidden');
        stats.classList.remove('hidden');
        stats.textContent = `共 ${sectors.length} 个行业板块`;

        tbody.innerHTML = sectors.map((s, i) => {
          const name = s.f14 || s.f12;
          const pct = parseFloat(s.f3) || 0;
          const chgAmt = parseFloat(s.f2) || 0;
          const inflow = parseFloat(s.f104) || 0; // 主力资金
          const inflowYuan = (parseFloat(s.f105) || 0); // 主力资金(万元? 需要确认)

          const pctClass = pct > 0 ? 'text-red-400' : pct < 0 ? 'text-green-400' : 'text-gray-400';
          const inflowClass = inflow > 0 ? 'text-red-400' : inflow < 0 ? 'text-green-400' : 'text-gray-400';

          return `<tr class="hover:bg-gray-800/50">
            <td class="px-4 py-3 text-xs text-gray-500">${i+1}</td>
            <td class="px-4 py-3 font-medium">${name}</td>
            <td class="px-4 py-3 text-right tabular-nums ${pctClass}">${pct > 0 ? '+' : ''}${pct.toFixed(2)}%</td>
            <td class="px-4 py-3 min-w-[120px]">${renderBar(pct, maxPct)}</td>
            <td class="px-4 py-3 text-right tabular-nums ${inflowClass}">${(inflow / 100000000).toFixed(2)}</td>
          </tr>`;
        }).join('');

        // Auto refresh
        setTimeout(load, 60000);
      } catch (e) {
        loading.classList.add('hidden');
        errorEl.classList.remove('hidden');
        errorEl.textContent = '⚠️ 数据加载失败: ' + e.message + '。请刷新重试。';
        stats.classList.add('hidden');
      }
    }

    load();
  })();
  </script>
</body>
</html>
