<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>A股实时行情速查 — 上证/深证/创业板/科创50实时点位 | Stock Tools</title>
  <meta name="description" content="A股实时行情速查，免费查看上证指数、深证成指、创业板指、科创50实时点位与涨跌幅，支持个股代码搜索。数据来源腾讯证券。">
  <meta name="keywords" content="A股行情,上证指数,深证成指,创业板指,科创50,实时行情,股票行情">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config={darkMode:'class',theme:{extend:{}}}</script>
  <style>body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Noto Sans SC',sans-serif}td,th{padding:6px 12px}</style>
</head>
<body class="bg-gray-950 text-gray-200 min-h-screen">
  <header class="border-b border-gray-800 py-6">
    <div class="max-w-4xl mx-auto px-4">
      <h1 class="text-2xl font-bold text-white">📈 A股实时行情速查</h1>
      <p class="text-gray-400 text-sm mt-1">数据来源：腾讯证券 · 自动每 30 秒刷新</p>
    </div>
  </header>

  <main class="max-w-4xl mx-auto px-4 py-6">
    <!-- Indices -->
    <div id="indices" class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8"></div>

    <!-- Search individual stock -->
    <div class="mb-6">
      <div class="flex gap-2">
        <input id="stockCode" type="text" placeholder="输入股票代码（如 600519, sh600519, sz000858）" class="flex-1 bg-gray-900 border border-gray-700 rounded-lg px-4 py-2.5 text-sm focus:border-blue-500 outline-none">
        <button onclick="searchStock()" class="bg-blue-600 hover:bg-blue-500 text-white px-5 py-2 rounded-lg text-sm font-medium">查询</button>
      </div>
      <p class="text-xs text-gray-500 mt-1">支持 sh/sz 前缀或不带前缀的 A 股代码</p>
    </div>

    <!-- Stock result -->
    <div id="stockResult" class="hidden">
      <div class="bg-gray-900 rounded-xl p-5 border border-gray-800">
        <div class="flex items-center justify-between mb-4">
          <div>
            <span id="sName" class="text-lg font-semibold text-white"></span>
            <span id="sCode" class="text-sm text-gray-400 ml-2"></span>
          </div>
          <span id="sTime" class="text-xs text-gray-500"></span>
        </div>
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 text-center">
          <div><div class="text-xs text-gray-400">最新价</div><div id="sPrice" class="text-xl font-bold text-white tabular-nums"></div></div>
          <div><div class="text-xs text-gray-400">涨跌幅</div><div id="sChgPct" class="text-xl font-bold tabular-nums"></div></div>
          <div><div class="text-xs text-gray-400">涨跌额</div><div id="sChgAmt" class="text-lg font-semibold tabular-nums"></div></div>
          <div><div class="text-xs text-gray-400">成交量</div><div id="sVol" class="text-lg font-semibold text-gray-300 tabular-nums"></div></div>
        </div>
        <div class="grid grid-cols-2 md:grid-cols-3 gap-4 text-center mt-4 text-sm">
          <div><span class="text-gray-400">最高:</span> <span id="sHigh" class="tabular-nums"></span></div>
          <div><span class="text-gray-400">最低:</span> <span id="sLow" class="tabular-nums"></span></div>
          <div><span class="text-gray-400">昨收:</span> <span id="sPreClose" class="tabular-nums"></span></div>
          <div><span class="text-gray-400">今开:</span> <span id="sOpen" class="tabular-nums"></span></div>
          <div><span class="text-gray-400">换手率:</span> <span id="sTurnover" class="tabular-nums"></span></div>
          <div><span class="text-gray-400">振幅:</span> <span id="sAmplitude" class="tabular-nums"></span></div>
        </div>
      </div>
    </div>
    <div id="stockError" class="hidden text-red-400 text-sm mt-2"></div>

    <!-- Other tools -->
    <div class="mt-12 pt-6 border-t border-gray-800 text-center text-sm text-gray-500 space-y-2">
      <p>
        <a href="sectors.html" class="text-blue-400 hover:text-blue-300">📊 行业板块涨跌榜</a>
        <span class="mx-2">·</span>
        <a href="fx.html" class="text-blue-400 hover:text-blue-300">💱 汇率 &amp; 加密货币行情</a>
        <span class="mx-2">·</span>
        <a href="bond.html" class="text-blue-400 hover:text-blue-300">🔗 可转债计算器</a>
        <span class="mx-2">·</span>
        <a href="index.html" class="text-blue-400 hover:text-blue-300">🏠 首页</a>
      </p>
    </div>
  </main>

  <footer class="border-t border-gray-800 py-8 text-center text-sm text-gray-500">
    <p class="mb-2">⚠️ 数据仅供参考，不构成投资建议。延时约 1-3 秒。</p>
    <p class="mb-2">打赏: <code class="text-gray-400 select-all">0x0D42B32D6E21F496082104BFC8d7213081474577</code> (ETH / USDT ERC-20)</p>
    <p>
      <a href="https://prompt-pack-one.vercel.app" class="inline-flex items-center gap-1 text-gray-600 hover:text-gray-300 transition">
        <span>🦄</span> Pony Promo — 独立开发者的 30s 竖屏宣传视频，$19
      </a>
    </p>
  </footer>

  <script>
  const INDICES = [
    { code: 'sh000001', name: '上证指数' },
    { code: 'sz399001', name: '深证成指' },
    { code: 'sz399006', name: '创业板指' },
    { code: 'sh000688', name: '科创50' },
  ];

  let refreshTimer;

  async function fetchTenc(codes) {
    const url = 'https://qt.gtimg.cn/q=' + codes.join(',');
    const res = await fetch(url);
    const buf = await res.arrayBuffer();
    const text = new TextDecoder('gbk').decode(buf);
    return text.split(';').filter(Boolean).map(line => {
      const m = line.match(/"(.+)"/);
      if (!m) return null;
      const f = m[1].split('~');
      return f;
    }).filter(Boolean);
  }

  function renderIndex(arr) {
    const name = arr[1];
    const price = parseFloat(arr[3]).toFixed(2);
    const chgPct = parseFloat(arr[32]);
    const chgAmt = parseFloat(arr[31]);
    const chgClass = chgPct > 0 ? 'text-red-400' : chgPct < 0 ? 'text-green-400' : 'text-gray-400';
    const bgClass = chgPct > 0 ? 'bg-red-900/20 border-red-900/30' : chgPct < 0 ? 'bg-green-900/20 border-green-900/30' : 'bg-gray-900 border-gray-800';
    return `<div class="${bgClass} border rounded-xl p-4 text-center">
      <div class="text-sm text-gray-400 mb-1">${name}</div>
      <div class="text-2xl font-bold text-white tabular-nums">${price}</div>
      <div class="text-sm ${chgClass} tabular-nums mt-1">${chgPct > 0 ? '+' : ''}${chgPct.toFixed(2)}%</div>
      <div class="text-xs text-gray-500 tabular-nums mt-0.5">${chgAmt > 0 ? '+' : ''}${chgAmt.toFixed(2)}</div>
    </div>`;
  }

  async function refreshIndices() {
    const data = await fetchTenc(INDICES.map(i => i.code));
    const el = document.getElementById('indices');
    if (data.length < 4) {
      el.innerHTML = '<p class="text-gray-500 text-sm col-span-4 text-center py-10">数据加载中…</p>';
      return;
    }
    el.innerHTML = data.map(renderIndex).join('');
  }

  async function searchStock() {
    let raw = document.getElementById('stockCode').value.trim();
    if (!raw) return;
    // Normalize: if no prefix, try sh then sz
    if (!/^(sh|sz)/.test(raw)) {
      // Try sh first
      const shData = await fetchTenc(['sh' + raw]);
      if (shData[0] && shData[0][1] && shData[0][1] !== '未知') {
        displayStock(shData[0]);
        return;
      }
      const szData = await fetchTenc(['sz' + raw]);
      if (szData[0] && szData[0][1] && szData[0][1] !== '未知') {
        displayStock(szData[0]);
        return;
      }
      document.getElementById('stockError').textContent = '未找到该代码，请检查后重试。';
      document.getElementById('stockError').classList.remove('hidden');
      document.getElementById('stockResult').classList.add('hidden');
      return;
    }
    const data = await fetchTenc([raw]);
    if (!data[0] || !data[0][1] || data[0][1] === '未知') {
      document.getElementById('stockError').textContent = '未找到该代码，请检查后重试。';
      document.getElementById('stockError').classList.remove('hidden');
      document.getElementById('stockResult').classList.add('hidden');
      return;
    }
    displayStock(data[0]);
  }

  function displayStock(f) {
    document.getElementById('stockError').classList.add('hidden');
    document.getElementById('stockResult').classList.remove('hidden');
    const name = f[1];
    const code = f[2];
    const price = parseFloat(f[3]).toFixed(2);
    const chgPct = parseFloat(f[32]);
    const chgAmt = parseFloat(f[31]);
    const chgClass = chgPct > 0 ? 'text-red-400' : chgPct < 0 ? 'text-green-400' : 'text-gray-400';
    document.getElementById('sName').textContent = name;
    document.getElementById('sCode').textContent = code;
    document.getElementById('sTime').textContent = '更新时间: ' + f[30];
    document.getElementById('sPrice').textContent = price;
    const cpEl = document.getElementById('sChgPct');
    cpEl.textContent = (chgPct > 0 ? '+' : '') + chgPct.toFixed(2) + '%';
    cpEl.className = 'text-xl font-bold tabular-nums ' + chgClass;
    const caEl = document.getElementById('sChgAmt');
    caEl.textContent = (chgAmt > 0 ? '+' : '') + chgAmt.toFixed(2);
    caEl.className = 'text-lg font-semibold tabular-nums ' + chgClass;
    document.getElementById('sVol').textContent = (parseFloat(f[6]) / 10000).toFixed(0) + '万手';
    document.getElementById('sHigh').textContent = parseFloat(f[33]).toFixed(2);
    document.getElementById('sLow').textContent = parseFloat(f[34]).toFixed(2);
    document.getElementById('sPreClose').textContent = parseFloat(f[4]).toFixed(2);
    document.getElementById('sOpen').textContent = parseFloat(f[5]).toFixed(2);
    document.getElementById('sTurnover').textContent = parseFloat(f[38]).toFixed(2) + '%';
    document.getElementById('sAmplitude').textContent = parseFloat(f[43]).toFixed(2) + '%';
  }

  // Enter key triggers search
  document.getElementById('stockCode').addEventListener('keydown', e => { if (e.key === 'Enter') searchStock(); });

  // Init
  refreshIndices();
  refreshTimer = setInterval(refreshIndices, 30000);
  </script>
</body>
</html>
